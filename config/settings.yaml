# 量化因子挖掘 Agents Team 配置文件

# 主循环配置
main_loop:
  max_iterations: null  # null表示无限循环，可设置为具体数字如 1000
  log_every_n_rounds: 10  # 每10轮输出一次统计
  save_state_every_n_rounds: 50  # 每50轮保存一次状态

# 数据配置
data:
  raw_file: ""  # 原始数据文件路径 (使用正斜杠)
  cache_dir: ""  # 缓存目录
  output_dir: ""  # 输出目录

# Idea生成配置
idea_generation:
  generate_num: 4  # 每轮生成4个想法
  dedup_enabled: true  # 启用去重
  max_history: 1000  # 保留最近1000个历史想法

# 表达式生成配置
expression_generation:
  max_per_idea: 2  # 每个想法最多生成2个表达式
  dedup_enabled: true
  syntax_check: true  # 启用语法检查

# 登录凭证
brain:
  email: ""
  password: ""

# 回测配置
backtest:
  simulation_mode: false  # 设置为 false 使用真实回测，true 使用模拟回测
  max_workers: 4  # 并行回测线程数（1-4）
  
  # 回测参数设置
  settings:
    region: ""
    universe: ""
    delay: 1
    decay: 0
    neutralization: ""
    truncation: 0.08
    pasteurization: "ON"
    test_period: "P0Y0M0D"
    nan_handling: "ON"
    max_trade: "OFF"
  
  # 筛选阈值
  filter_threshold:
    min_sharpe: 0.8  # 筛选条件：sharpe > 0.8
  
  # 分类阈值
  threshold:
    good:  # 优质因子标准
      min_sharpe: 1.0
      min_return: 0.05
      max_drawdown: 0.15
    bad:  # 劣质因子标准
      max_sharpe: 0.3
    improve:  # 待改进标准
      min_sharpe: 0.3
      max_sharpe: 1.0
  
# 改进配置
improvement:
  enabled: true
  max_rounds_per_expr: 1  # 简化版：单轮改进
  strategies:
    - "replace_op"  # 替换操作符
    - "adjust_param"  # 调整参数
    - "simplify"  # 简化结构

# 日志配置
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  save_good: true  # 保存优质因子
  save_bad: true  # 保存劣质因子
  save_rounds: true  # 保存每轮统计
  log_dir: "logs"

# Supervisor配置
supervisor:
  max_retries: 3  # 最大重试次数
  retry_delay: 1.0  # 重试间隔（秒）

# LLM配置
llm:
  provider: "openai"
  api_key: ""  
  model: "deepseek-v4-flash"
  base_url: "https://api.deepseek.com"  # 可选，用于兼容其他API
  temperature: 0.3  # deepseek-v4-flash 模型默认 temperature=0.7

